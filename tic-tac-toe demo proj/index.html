<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe / dot_style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">[ TIC / TAC / TOE ]</h1>
            <div class="status-box">
                <span id="turn-indicator" class="dot-matrix-text">P1 TURN [X]</span>
            </div>
        </header>
        
        <main>
            <div class="mode-selector">
                <button id="btn-pvp" class="btn active">Player vs Player</button>
                <button id="btn-pvc" class="btn">Player vs Computer</button>
            </div>
            
            <div id="board" class="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            
            <div class="controls">
                <button id="btn-reset" class="btn">RESET_SYS</button>
            </div>
        </main>

        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="winner-text" class="dot-matrix-text">P1 WINS!</h2>
                <button id="btn-modal-close" class="btn">CONTINUE</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
